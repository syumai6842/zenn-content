name: Daily Zenn Book Publisher

on:
  schedule:
    # 毎日 03:00 JST (18:00 UTC) に実行。日中の対話セッションとMaxプラン枠の競合を避ける
    - cron: '0 18 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        book: [1, 2, 3]
      max-parallel: 1
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Get theme from queue
        id: theme
        run: |
          THEME_LINE=$(grep -n '^### [0-9]' .claude/outputs/research/zenn-theme-queue.md | grep -v '\[済\]' | sed -n '${{ matrix.book }}p')
          if [ -z "$THEME_LINE" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          LINE_NUM=$(echo "$THEME_LINE" | cut -d: -f1)
          TITLE=$(echo "$THEME_LINE" | sed 's/^[0-9]*:### [0-9]*\. //')
          echo "line_num=$LINE_NUM" >> "$GITHUB_OUTPUT"
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          NEXT_LINE=$(awk "NR>$LINE_NUM && /^### [0-9]/{print NR; exit}" .claude/outputs/research/zenn-theme-queue.md)
          if [ -n "$NEXT_LINE" ]; then
            sed -n "${LINE_NUM},$((NEXT_LINE - 1))p" .claude/outputs/research/zenn-theme-queue.md > /tmp/theme-detail.txt
          else
            sed -n "${LINE_NUM},/^---$/p" .claude/outputs/research/zenn-theme-queue.md > /tmp/theme-detail.txt
          fi

      - name: Create book with Claude
        if: steps.theme.outputs.skip != 'true'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_OAUTH_TOKEN }}
        run: |
          {
            cat .github/scripts/book-prompt.txt | sed 's/THEME_PLACEHOLDER/（下記参照）/'
            echo ""
            echo "--- テーマ詳細 ---"
            cat /tmp/theme-detail.txt
          } > /tmp/prompt.txt
          claude -p "$(cat /tmp/prompt.txt)" --allowedTools "Read,Write,Edit,Bash,WebSearch,WebFetch"

      - name: Safety check with auto-fix loop
        if: steps.theme.outputs.skip != 'true'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_OAUTH_TOKEN }}
        run: |
          chmod +x .github/scripts/pre-publish-check.sh
          MAX_RETRIES=3
          for i in $(seq 1 $MAX_RETRIES); do
            echo "=== Safety check attempt $i/$MAX_RETRIES ==="
            if .github/scripts/pre-publish-check.sh "books/" 2>&1 | tee /tmp/safety-check-output.txt; then
              echo "Safety check passed on attempt $i"
              exit 0
            fi
            if [ "$i" -eq "$MAX_RETRIES" ]; then
              echo "Safety check failed after $MAX_RETRIES attempts. Skipping this book."
              exit 0
            fi
            echo "Auto-fixing..."
            ISSUES=$(cat /tmp/safety-check-output.txt)
            claude -p "$(cat .github/scripts/safety-fix-prompt.txt) Failed output: ${ISSUES}" --allowedTools "Read,Write,Edit,Bash"
          done

      - name: Mark theme as done and push
        if: steps.theme.outputs.skip != 'true'
        run: |
          LINE_NUM=${{ steps.theme.outputs.line_num }}
          sed -i "${LINE_NUM}s/$/ [済]/" .claude/outputs/research/zenn-theme-queue.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git stash
          git pull --rebase origin main
          git stash pop || true
          git add -A
          git commit -m "auto-publish: ${{ steps.theme.outputs.title }}" || true
          git push
